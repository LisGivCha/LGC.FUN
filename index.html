<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatetí Local</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 40px;
}

h1 { margin-bottom: 10px; }

#turn {
  font-size: 18px;
  margin-bottom: 20px;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  width: 300px;
  margin: auto;
}

.cell {
  width: 100px;
  height: 100px;
  font-size: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid black;
  cursor: pointer;
  user-select: none;
}

.cell:hover {
  background: #f0f0f0;
}

/* pantalla de victoria */
#winScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  color: white;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#winText {
  font-size: 40px;
  margin-bottom: 20px;
}

#restartBtn {
  font-size: 22px;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Tatetí (3 en raya)</h1>
<div id="turn">Turno: X</div>

<div id="board"></div>

<div id="winScreen">
  <div id="winText"></div>
  <button id="restartBtn">⬅ Reiniciar</button>
</div>

<script>
let board = Array(9).fill(null);
let turn = "X";
let gameOver = false;

const boardDiv = document.getElementById("board");
const winScreen = document.getElementById("winScreen");
const winText = document.getElementById("winText");
const restartBtn = document.getElementById("restartBtn");
const turnText = document.getElementById("turn");

function drawBoard() {
  boardDiv.innerHTML = "";

  board.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = cell;

    div.onclick = () => play(i);

    boardDiv.appendChild(div);
  });

  turnText.textContent = gameOver ? "" : "Turno: " + turn;
}

function play(i) {
  if (board[i] || gameOver) return;

  board[i] = turn;

  if (checkWin(turn)) {
    showWin(turn);
    gameOver = true;
    return;
  }

  if (board.every(c => c !== null)) {
    showWin("Empate");
    gameOver = true;
    return;
  }

  turn = turn === "X" ? "O" : "X";
  drawBoard();
}

function checkWin(p) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return wins.some(combo =>
    combo.every(i => board[i] === p)
  );
}

function showWin(player) {
  winScreen.style.display = "flex";

  if (player === "Empate") {
    winText.textContent = "Empate 🤝";
  } else {
    winText.textContent = "Victoria de " + player + " 🎉";
  }
}

restartBtn.onclick = () => {
  board = Array(9).fill(null);
  turn = "X";
  gameOver = false;
  winScreen.style.display = "none";
  drawBoard();
};

drawBoard();
</script>

</body>
</html>
