<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v3.1.1 SAVE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',Arial}
body{background:#000;color:#fff;overflow-x:hidden;min-height:100vh}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

header{padding:30px;background:linear-gradient(90deg,rgba(0,0,0,0.98),rgba(0,247,255,0.15),rgba(0,0,0,0.98));border-bottom:5px solid #00f7ff;text-align:center;position:sticky;top:0;z-index:100}
h1{color:#00f7ff;text-shadow:0 0 40px #00f7ff;font-size:36px;font-weight:900;font-family:'Orbitron'}

#btnLogros{position:fixed;top:35px;left:30px;z-index:200;background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;color:#000;padding:20px;border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 0 40px rgba(255,215,0,0.8)}

#panelLogros{position:fixed;top:0;right:-500px;width:450px;height:100%;background:linear-gradient(180deg,#0a0a1a,#000);border-left:5px solid #ffd700;z-index:199;transition:right 0.7s;overflow-y:auto;padding:35px}
#panelLogros.open{right:0}

nav{display:flex;justify-content:center;gap:15px;margin-top:25px;flex-wrap:wrap}
nav button{background:linear-gradient(135deg,rgba(10,10,26,0.95),rgba(0,247,255,0.1));border:4px solid #00f7ff;color:#00f7ff;padding:16px 24px;border-radius:18px;cursor:pointer;font-weight:bold;font-size:15px;font-family:'Orbitron'}
nav button:hover{background:#00f7ff;color:#000;transform:scale(1.1)}
nav button.active{background:linear-gradient(135deg,#00f7ff,#0088ff);color:#000}

.card{display:none;max-width:1100px;margin:30px auto;padding:40px;background:rgba(0,0,0,0.9);border-radius:30px;border:3px solid #00f7ff}
.card.active{display:block}

.btn{background:linear-gradient(135deg,#00f7ff,#0088ff);color:#000;border:none;padding:18px 28px;border-radius:18px;margin:10px;cursor:pointer;font-weight:bold;font-size:16px;font-family:'Orbitron'}
.btn:hover{transform:scale(1.1);box-shadow:0 0 30px #00f7ff}
.btn-rojo{background:linear-gradient(135deg,#ff0033,#cc0029)}

.logro{background:rgba(10,10,26,0.95);border:4px solid #444;padding:18px;margin:12px;border-radius:18px;text-align:left;font-size:15px}
.logro.done{border-color:#00ff88;background:rgba(0,255,136,0.2)}

.noticia{background:rgba(0,0,0,0.9);border-left:5px solid #00f7ff;padding:20px;margin:15px 0;border-radius:15px}
.nueva{border-left-color:#ffd700}

#tateti{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;width:360px;margin:30px auto}
.celda{width:120px;height:120px;background:rgba(10,10,26,0.95);border:5px solid #00f7ff;display:flex;align-items:center;justify-content:center;font-size:55px;color:#00f7ff;cursor:pointer;font-weight:bold;border-radius:20px;font-family:'Orbitron'}

#clickBox{width:220px;height:220px;background:radial-gradient(circle,#00f7ff,#0088ff);border-radius:50%;margin:30px auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:bold;color:#000;box-shadow:0 0 60px #00f7ff;font-family:'Orbitron'}

canvas{border:4px solid #00f7ff;border-radius:20px;background:#000;margin:10px}
.respuesta{max-height:300px;overflow-y:auto;background:rgba(0,0,0,0.9);padding:20px;border-radius:15px;margin-top:20px;text-align:left;font-size:15px;border:2px solid #00f7ff}
select{padding:12px;border-radius:15px;background:rgba(10,10,26,0.9);color:#fff;border:3px solid #00f7ff;width:100%;font-size:15px}

#stats{position:fixed;top:35px;right:30px;background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:15px;border:2px solid #00f7ff;font-family:'Orbitron'}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<button id="btnLogros" onclick="toggleLogros()">🏆</button>
<div id="stats">Logros: <span id="statLogros">0/200</span></div>
<div id="panelLogros"><h2 style="color:#ffd700;text-align:center;font-family:'Orbitron'">Logros <span id="contLogros"></span></h2><button class="btn btn-rojo" onclick="resetearProgreso()" style="width:100%;margin-bottom:20px">RESETEAR PROGRESO</button><div id="listaLogros"></div></div>

<header>
<h1>⚡ LGC.FUN v3.1.1 SAVE ⚡</h1>
<nav>
<button class="active" onclick="show('lab')">Laboratorio</button>
<button onclick="show('periodico')">Periódico</button>
<button onclick="show('novedades')">Novedades</button>
</nav>
</header>

<div id="lab" class="card active">
<h2 style="text-align:center;margin-bottom:25px;font-family:'Orbitron'">🧪 LABORATORIO ULTRA 🧪</h2>
<div style="text-align:center">
<button class="btn" onclick="showExp('tateti')">Ta-Te-Ti IA Pro</button>
<button class="btn" onclick="showExp('click')">Click CPS Turbo</button>
<button class="btn" onclick="showExp('circulo')">Círculo Perfecto</button>
<button class="btn" onclick="showExp('dibujo')">Dibujar Libre HD</button>
<button class="btn" onclick="showExp('gravedad')">Gravedad Real</button>
<button class="btn" onclick="showExp('que')">¿Qué pasaría si?</button>
</div>
<div id="exp-area" style="margin-top:30px"></div>
</div>

<div id="periodico" class="card">
<h2 style="text-align:center;font-family:'Orbitron';margin-bottom:20px">📰 PERIÓDICO LGC</h2>
<div id="listaPeriodico"></div>
</div>

<div id="novedades" class="card">
<h2 style="text-align:center;font-family:'Orbitron';margin-bottom:20px">✨ NOVEDADES v3.1.1 ✨</h2>
<div id="listaNovedades"></div>
</div>

<script>
let logros=[],clicks=0,mejorCPS=0,tab=Array(9).fill('');
const nombresLogros=Array(200).fill().map((_,i)=>`Logro Legendario ${i+1}: ${["Primer Paso","Click Maestro","Círculo Perfecto","Artista","Físico","Curioso","Estratega","Velocista","Perfeccionista","Creador","Rey TaTeTi","CPS Pro","Geometría","Picasso","Newton","Filósofo","General","Flash","Cirujano","Da Vinci","Campeón","10K Clicks","Arte","Einstein","Sócrates","Maestro","Superman","Leonardo","Tesla","Platón","Invencible","100K","Obras","Gravedad 0","Aristóteles","Leyenda","Quicksilver","Miguel Ángel","Curie","Confucio","Imparable","1M","Galería","Big Bang","Nietzsche","Mito","Sonic","Van Gogh","Bohr","Buda","Eterno","10M","Museo","Agujero Negro","Kant","Dios Juego","Zoom","Monet","Fermi","Gandhi","Gloria","1B","Louvre","Universo","Spinoza","Titán","Roadrunner","DaVinci2","Oppenheimer","Mandela","Omnipotente","10B","Cósmico","Multiverso","Hegel","Coloso","Imposible","Picasso2","Feynman","Lincoln","Divino","100B","Creación","Dimensión 4","Marx","Héroe","Luz","Warhol","Schrödinger","Churchill","Supremo","1T","Big Crunch","Tiempo","Nietzsche2","Campeón","Teleport","Banksy","Dirac","Napoleón","Elegido","10T","Fin Tiempo","Eternidad","Sartre","Leyenda","Hiper","Dali","Planck","César","Único","100T","Nada","Vacío","Camus","Máquina","Luz Pura","Goya","Heisenberg","Alejandro","Origen","1Q","Todo","Ser","Kierkegaard","Androide","Energía","Velázquez","Pauli","Aníbal","Principio","10Q","Universo","Existencia","Wittgenstein","Cyborg","Materia","Rembrandt","Fermi2","Gengis","Todo","100Q","Realidad","Conciencia","Russell","Robot","Antigua","El Greco","Bohr2","Atila","Infinito","1S","Verdad","Alma","Popper","IA","Quantum","Klimt","Dirac2","Julio","Absoluto","10S","Dios","Espíritu","Kuhn","Singularidad","Relatividad","Frida","Schrödinger2","Augusto","Eterno","100S","Nirvana","Iluminación","Foucault","Transcendencia","Cuántica","Kahlo","Tesla2","Constantino","Final","1D","Paraíso","Zen","Baudrillard","Ascensión","Cuerdas","O'Keeffe","Einstein2","Justiniano","Alfa","10D","Cielo","Samadhi","Derrida","Evolución","Supergravedad","Picasso3","Hawking2","Carlomagno","Omega","100D","Infierno","Moksha","Lyotard","Revolución","M-Teoría","VanGogh2","Bohr3","Napoleón2"][i%100]}`);

const escenarios=Array(150).fill().map((_,i)=>`Escenario ${i+1}: ${["el mundo se congela","todos leen mentes","gravedad invertida","sin colores","tiempo atrás","animales hablan","sombra viva","lluvia caramelos","autos vuelan","sin internet","todos 3 metros","plantas instantáneas","sol morado","puedes volar","sin dinero","superpoderes","noche 1 semana","libros solos","reflejo independiente","agua sólida","teletransportación","mascotas gobiernan","sin electricidad","vidas pasadas","edificios respiran","chocolate gratis","pausar tiempo","muertos vuelven","sin mentiras","invisibles","música se ve","sueños reales","ver futuro","sin gravedad","todos genios","mar dulce","máquinas sienten","duplicarte","sin armas","1 idioma","cielo verde","cambiar cuerpo","sin escuelas","millonarios","robots trabajan","curar tocar","sin fronteras","fuego frío","revivir","todos artistas","sin enfermedades","tiempo dinero","ver paredes","todos felices","sin policía","casas vivas","volverte pequeño","todos famosos","sin trabajo","espacio respirable","controlar clima","todos jóvenes","sin vejez","objetos flotan","leer rápido","todos músicos","sin guerra","tocar estrellas","cambiar pasado","todos atletas","sin hambre","luna habitable","hablar plantas","todos científicos","sin crímenes","planetas chocan","crear portales","todos pintores","sin impuestos","universo fin","ver átomos","todos escritores","sin contaminación","galaxias cerca","mover montañas","todos bailarines","sin pobreza","tiempo congela","crear vida","todos actores","sin desigualdad","agujeros seguros","respirar agua","todos chefs","sin discriminación","dimensiones infinitas","controlar mentes","todos inventores","sin racismo","universo reinicia","viajar tiempo","todos diseñadores","sin violencia","leyes cambian","crear planetas","todos poetas","sin corrupción","realidad simulación","ser 2 personas","todos fotógrafos","sin injusticia","cosmos consciente","borrar recuerdos","todos programadores","sin sufrimiento","estrellas cantan","crear dimensiones","todos filósofos","sin odio","materia energía","ver alma","todos curanderos","sin miedo","tiempo circular","crear universos","todos maestros","sin dolor","galaxias hablan","ser inmortal","todos líderes","sin guerra","existencia sueño","crear dioses","todos sabios","sin final","todo es uno","ser todo","todos libres","sin límites","realidad tuya","crear todo","todos dioses","nada","infinito real"][i]}`);

const actualizaciones=[
{v:"v3.1.1",f:"04/10/2026",t:"GUARDADO PERMANENTE",d:"Ahora tu progreso se guarda para siempre. 200 logros y estadísticas guardadas."},
{v:"v3.1.0",f:"04/10/2026",t:"FIX COMPLETO",d:"Todos los botones funcionan. Fondo de estrellas real."}
];

// GUARDAR Y CARGAR
function guardarProgreso(){
  localStorage.setItem('lgc_logros', JSON.stringify(logros));
  localStorage.setItem('lgc_mejorCPS', mejorCPS);
  localStorage.setItem('lgc_version', '3.1.1');
}

function cargarProgreso(){
  const data = localStorage.getItem('lgc_logros');
  if(data){logros = JSON.parse(data)}else{logros = Array(200).fill(false)}
  mejorCPS = parseFloat(localStorage.getItem('lgc_mejorCPS')) || 0;
}

function resetearProgreso(){
  if(confirm('¿Seguro que quieres borrar TODO tu progreso?')){
    logros = Array(200).fill(false);
    mejorCPS = 0;
    guardarProgreso();
    renderLogros();
    alert('Progreso reiniciado');
  }
}

function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if(id=='periodico')cargarPeriodico();
  if(id=='novedades')cargarNovedades();
}

function toggleLogros(){document.getElementById('panelLogros').classList.toggle('open');renderLogros()}

function cargarPeriodico(){
  let html='';
  actualizaciones.forEach(a=>html+=`<div class="noticia"><div style="color:#00f7ff">${a.f} - ${a.v}</div><h3>${a.t}</h3><p>${a.d}</p></div>`);
  document.getElementById('listaPeriodico').innerHTML=html;
}

function cargarNovedades(){
  let html=`<div class="noticia nueva"><div style="color:#ffd700">04/10/2026 - v3.1.1</div><h3>💾 Guardado Automático</h3><p>Tu progreso ya no se pierde. Se guarda solo en tu navegador.</p></div>`;
  html+=`<div class="noticia nueva"><div style="color:#ffd700">04/10/2026</div><h3>📊 Estadísticas</h3><p>Ahora ves cuantos logros tienes arriba a la derecha</p></div>`;
  document.getElementById('listaNovedades').innerHTML=html;
}

function showExp(t){
  let html='';
  if(t=='tateti')html=`<h3>Ta-Te-Ti vs IA</h3><div><button class="btn" onclick="setDif('facil')">Fácil</button><button class="btn" onclick="setDif('medio')">Medio</button><button class="btn" onclick="setDif('dificil')">Difícil</button></div><div id="tateti"></div><button class="btn" onclick="resetT()">Reiniciar</button><p id="msgT"></p>`;
  if(t=='click')html=`<h3>Click CPS - Mejor: ${mejorCPS.toFixed(2)}</h3><div><button class="btn" onclick="setTimer(5)">5s</button><button class="btn" onclick="setTimer(10)">10s</button><button class="btn" onclick="setTimer(30)">30s</button></div><div id="clickBox" onclick="clickear()">0</div><p id="timeLeft"></p>`;
  if(t=='circulo')html=`<h3>Dibuja un Círculo</h3><canvas id="draw" width="400" height="400"></canvas><p id="porcentaje"></p>`;
  if(t=='dibujo')html=`<h3>Dibujo Libre</h3><canvas id="draw2" width="400" height="400"></canvas><br><button class="btn btn-rojo" onclick="limpiar2()">LIMPIAR</button>`;
  if(t=='gravedad')html=`<h3>Gravedad</h3><button class="btn" onclick="crearPelota()">Lanzar Pelota</button><canvas id="grav" width="400" height="400"></canvas>`;
  if(t=='que')html=`<h3>150 Escenarios</h3><select id="escenario"></select><button class="btn" onclick="mostrarRespuesta()">Ver Respuesta</button><div id="resp" class="respuesta"></div>`;
  document.getElementById('exp-area').innerHTML=html;
  if(t=='tateti')crearT();
  if(t=='circulo')initDraw('draw',false);
  if(t=='dibujo')initDraw('draw2',true);
  if(t=='gravedad')loopG();
  if(t=='que')cargarEscenarios();
}

function setDif(d){resetT()}
function crearT(){let h='';for(let i=0;i<9;i++)h+=`<div class="celda" onclick="jugar(${i})"></div>`;document.getElementById('tateti').innerHTML=h}
function jugar(i){if(tab[i]!=''||ganador())return;tab[i]='X';actT();if(ganador()){desbloquearLogro(0);return}let libres=tab.map((v,k)=>v==''?k:null).filter(v=>v!=null);if(libres.length>0){tab[libres[Math.floor(Math.random()*libres.length)]]='O';actT();if(ganador())desbloquearLogro(10)}}
function actT(){document.querySelectorAll('.celda').forEach((c,i)=>c.innerText=tab[i])}
function ganador(){const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let w of wins){if(tab[w[0]]!=''&&tab[w[0]]==tab[w[1]]&&tab[w[1]]==tab[w[2]]){document.getElementById('msgT').innerText=`GANÓ ${tab[w[0]]}!`;return true}}if(!tab.includes('')){document.getElementById('msgT').innerText='EMPATE!';return true}return false}
function resetT(){tab=Array(9).fill('');document.getElementById('msgT').innerText='';crearT()}

let timerInt=null;
function setTimer(s){clearInterval(timerInt);clicks=0;document.getElementById('clickBox').innerText=0;let t=s;document.getElementById('timeLeft').innerText=`Tiempo: ${t}s`;timerInt=setInterval(()=>{t--;document.getElementById('timeLeft').innerText=`Tiempo: ${t}s`;if(t<=0){clearInterval(timerInt);let cps=(clicks/s).toFixed(2);if(cps>mejorCPS){mejorCPS=cps;guardarProgreso()}alert(`Resultado: ${clicks} clicks\nCPS: ${cps}\nMejor: ${mejorCPS}`);if(cps>5)desbloquearLogro(7);if(clicks>1000)desbloquearLogro(21);clicks=0;document.getElementById('clickBox').innerText=0}},1000)}
function clickear(){clicks++;document.getElementById('clickBox').innerText=clicks;if(clicks==100)desbloquearLogro(11)}

function initDraw(id,libre){
  const c=document.getElementById(id),dctx=c.getContext('2d');let dib=false, puntos=[];
  c.onmousedown=e=>{dib=true;puntos=[];if(!libre)dctx.clearRect(0,0,400,400);dctx.beginPath();dctx.moveTo(e.offsetX,e.offsetY)};
  c.onmousemove=e=>{if(dib){dctx.lineTo(e.offsetX,e.offsetY);dctx.strokeStyle='#00f7ff';dctx.lineWidth=6;dctx.stroke();puntos.push({x:e.offsetX,y:e.offsetY})}};
  c.onmouseup=()=>{dib=false;if(id=='draw'&&puntos.length>20)calcularCirculo(puntos)}
}
function calcularCirculo(p){let cx=0,cy=0;p.forEach(pt=>{cx+=pt.x;cy+=pt.y});cx/=p.length;cy/=p.length;let r=0;p.forEach(pt=>r+=Math.hypot(pt.x-cx,pt.y-cy));r/=p.length;let error=0;p.forEach(pt=>error+=Math.abs(Math.hypot(pt.x-cx,pt.y-cy)-r));let score=100-(error/p.length);document.getElementById('porcentaje').innerText=`Precisión: ${score.toFixed(0)}%`;if(score>80)desbloquearLogro(2)}
function limpiar2(){document.getElementById('draw2').getContext('2d').clearRect(0,0,400,400);desbloquearLogro(3)}

let pelotas=[];function crearPelota(){pelotas.push({x:200,y:50,r:20,vx:(Math.random()-0.5)*6,vy:0});desbloquearLogro(4)}
function loopG(){const gcan=document.getElementById('grav');if(!gcan)return;const gctx=gcan.getContext('2d');gctx.clearRect(0,0,400,400);pelotas.forEach(p=>{p.vy+=0.6;p.x+=p.vx;p.y+=p.vy;if(p.y>380){p.y=380;p.vy*=-0.7}if(p.x<20||p.x>380){p.vx*=-0.8}gctx.beginPath();gctx.arc(p.x,p.y,p.r,0,6.28);gctx.fillStyle='#00f7ff';gctx.fill()});requestAnimationFrame(loopG)}

function cargarEscenarios(){const sel=document.getElementById('escenario');sel.innerHTML='';escenarios.forEach((e,i)=>sel.innerHTML+=`<option value="${i}">${e}</option>`)}
function mostrarRespuesta(){const idx=document.getElementById('escenario').value;document.getElementById('resp').innerText=`${escenarios[idx]}: El mundo sería completamente diferente.`;desbloquearLogro(5+parseInt(idx))}

function desbloquearLogro(i){if(i<200&&!logros[i]){logros[i]=true;guardarProgreso();alert(`🏆 ${nombresLogros[i]}`)}}
function renderLogros(){let hechos=logros.filter(l=>l).length;document.getElementById('contLogros').innerText=` ${hechos}/200`;document.getElementById('statLogros').innerText=`${hechos}/200`;let html='';logros.forEach((l,i)=>html+=`<div class="logro ${l?'done':''}">${l?'✅':'⬜'} ${nombresLogros[i]}</div>`);document.getElementById('listaLogros').innerHTML=html}

// FONDO ESTRELLAS
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.onresize=resize;
let stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3,s:Math.random()*1+0.2});
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{ctx.fillStyle='white';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();s.y+=s.s;if(s.y>canvas.height)s.y=0});requestAnimationFrame(anim)}
anim();

// INICIAR
cargarProgreso();
cargarPeriodico();
cargarNovedades();
renderLogros();
</script>
</body>
  </html>
