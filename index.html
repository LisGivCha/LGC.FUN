<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaTeTi</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
touch-action:manipulation;
}

/* PANTALLAS */
.screen{
display:none;
height:100vh;
width:100vw;
padding:20px;
text-align:center;
}
.active{display:block}

/* LOGIN + MENU */
#login,#menu{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#1f3b2c;
background-image:
linear-gradient(rgba(255,255,255,0.05)1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.05)1px,transparent 1px);
background-size:50px 50px;
}

/* INPUT */
input{
width:80%;
max-width:300px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

/* BOTONES */
button{
width:80%;
max-width:300px;
padding:14px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
font-size:16px;
font-weight:bold;
}

/* INFO */
#info{
opacity:0.8;
font-size:14px;
}

/* TABLERO */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
width:90vw;
max-width:320px;
aspect-ratio:1;
gap:8px;
margin:auto;
margin-top:20px;
}

.cell{
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
border-radius:10px;
}

.cell:active{
transform:scale(0.92);
}

/* WIN */
#win{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

/* CONFETI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

/* ANIMACIÓN PANTALLA */
.fade{
animation:fade .3s ease;
}
@keyframes fade{
from{opacity:0;transform:scale(.97)}
to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active fade">
<h1>🎮 TaTeTi</h1>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="auth()">Entrar / Registrarse</button>
</div>

<!-- MENU -->
<div id="menu" class="screen fade">
<h1>MENÚ</h1>

<div id="info"></div>

<button onclick="start()">Jugar</button>
<button onclick="logout()">Cerrar sesión</button>
</div>

<!-- GAME -->
<div id="game" class="screen fade">
<div class="grid" id="grid"></div>
</div>

<!-- WIN -->
<div id="win" class="screen fade">
<h1 id="winText"></h1>
<button onclick="restart()">Seguir jugando</button>
<button onclick="toMenu()">Salir</button>
</div>

<script>

/* ===== USERS ===== */
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser=null;

/* LOGIN / REGISTER (UN SOLO BOTÓN) */
function auth(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u||!p)return;

/* crear si no existe */
if(!users[u]){
users[u]={pass:p,points:0};
}

/* validar */
if(users[u].pass!==p){
alert("Contraseña incorrecta");
return;
}

currentUser=u;
save();
show("menu");
updateInfo();
}

/* SAVE */
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

/* INFO MENU */
function updateInfo(){
document.getElementById("info").innerHTML=
"👤 "+currentUser+" | 🏆 "+users[currentUser].points+" pts";
}

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGOUT */
function logout(){
currentUser=null;
show("login");
}

/* ===== GAME ===== */
let board=["","","","","","","","",""];
let turn="X";
let active=true;

/* START */
function start(){
reset();
show("game");
}

/* RESET */
function reset(){
board=["","","","","","","","",""];
turn="X";
active=true;
draw();
}

/* DRAW */
function draw(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.innerText=board[i];
d.onclick=()=>play(i);
g.appendChild(d);
}
}

/* PLAY */
function play(i){
if(!active||board[i]!="")return;

board[i]=turn;
check();

turn=turn=="X"?"O":"X";
draw();
}

/* WIN CHECK */
function winner(){
let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
for(let x of w){
let[a,b,c]=x;
if(board[a]&&board[a]==board[b]&&board[a]==board[c])
return board[a];
}
return null;
}

/* CHECK */
function check(){
let w=winner();

if(w){
active=false;

/* puntos */
if(currentUser){
users[currentUser].points += (w==="X") ? 10 : 20;
save();
updateInfo();
}

confetti();
show("win");
winText.innerText="Ganó "+w;
return;
}

/* empate */
if(!board.includes("")){
active=false;
show("win");
winText.innerText="Empate";
}
}

/* CONFETTI */
function confetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* WIN SCREEN */
function restart(){
reset();
show("game");
}

function toMenu(){
updateInfo();
show("menu");
}

</script>

</body>
  </html>
