<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v1.3.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
body{background:#020211;color:#fff;overflow-x:hidden;text-align:center}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
header{padding:20px;background:linear-gradient(180deg,rgba(0,247,255,0.1),transparent);border-bottom:1px solid #00f7ff}
h1{color:#00f7ff;text-shadow:0 0 15px #00f7ff;font-size:2em}
nav{display:flex;justify-content:center;gap:10px;margin-top:15px;flex-wrap:wrap}
nav button{background:#0a0a1a;border:2px solid #00f7ff;color:#00f7ff;padding:12px 24px;border-radius:12px;cursor:pointer;font-weight:bold;transition:0.3s}
nav button:hover,nav button.active{background:#00f7ff;color:#000;box-shadow:0 0 15px #00f7ff}
.card{display:none;padding:25px;max-width:500px;margin:20px auto}
.card.active{display:block;animation:fade 0.4s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
#tateti{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:90%;max-width:300px;margin:20px auto;aspect-ratio:1}
.celda{aspect-ratio:1;background:#0a0a1a;border:3px solid #00f7ff;display:flex;align-items:center;justify-content:center;font-size:clamp(30px,10vw,60px);color:#00f7ff;cursor:pointer;border-radius:15px;transition:0.2s;font-weight:bold}
.celda:hover{background:#1a1a2a;transform:scale(1.05)}
.celda.X{color:#00ff88}.celda.O{color:#ff0066}
.btn{background:linear-gradient(90deg,#00f7ff,#0088ff);color:#000;border:none;padding:14px 28px;border-radius:12px;margin:10px;cursor:pointer;font-weight:bold;font-size:16px;transition:0.3s}
.btn:hover{transform:scale(1.05);box-shadow:0 0 20px #00f7ff}
#msg{font-size:18px;margin:15px;color:#00f7ff}
.stats{display:flex;justify-content:center;gap:20px;margin:15px;font-size:14px}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<header>
<h1>⚡ LGC.FUN v1.3.3</h1>
<nav>
<button id="b-menu" class="active" onclick="show('menu')">Menu</button>
<button id="b-juego" onclick="show('juego')">Ta-Te-Ti</button>
</nav>
</header>

<div id="menu" class="card active">
<h2>Bienvenido 🚀</h2>
<p>Versión estable y mejorada</p>
<p>Nada se rompe. Probá el Ta-Te-Ti</p>
</div>

<div id="juego" class="card">
<h2>Ta-Te-Ti vs Bot</h2>
<div class="stats">
<span>🏆 Ganadas: <b id="w">0</b></span>
<span>🤝 Empates: <b id="e">0</b></span>
<span>💀 Perdidas: <b id="l">0</b></span>
</div>
<div id="tateti"></div>
<button class="btn" onclick="reset()">Reiniciar</button>
<p id="msg">Tu turno: X</p>
</div>

<script>
let score={w:0,e:0,l:0};
function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('b-'+id).classList.add('active');
}

let tab=Array(9).fill('');
function crear(){
  let h='';
  for(let i=0;i<9;i++)h+=`<div class="celda" onclick="jugar(${i})"></div>`;
  document.getElementById('tateti').innerHTML=h;
  document.getElementById('msg').innerText='Tu turno: X';
}
function jugar(i){
  if(tab[i]!=''||ganar('X')||ganar('O'))return;
  tab[i]='X'; actualizar();
  if(ganar('X')){score.w++;return fin('Ganaste! 🎉')}
  let libres=tab.map((v,k)=>v==''?k:null).filter(v=>v!=null);
  if(libres.length==0){score.e++;return fin('Empate! 🤝')}
  tab[libres[Math.floor(Math.random()*libres.length)]]='O';
  actualizar();
  if(ganar('O')){score.l++;fin('Perdiste! 💀')}
}
function actualizar(){
  document.querySelectorAll('.celda').forEach((c,i)=>{
    c.innerText=tab[i];c.className='celda '+tab[i];
  });
  document.getElementById('w').innerText=score.w;
  document.getElementById('e').innerText=score.e;
  document.getElementById('l').innerText=score.l;
}
function ganar(j){
  return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c=>c.every(i=>tab[i]==j))
}
function fin(txt){document.getElementById('msg').innerText=txt}
function reset(){tab=Array(9).fill('');crear()}

crear();

// Estrellas mejoradas
const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.onresize=resize;
let stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,s:Math.random()*0.8+0.3,op:Math.random()});
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.op})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();s.y+=s.s;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width}});requestAnimationFrame(anim)}
anim();
</script>
</body>
</html>
