.btn:hover{transform:scale(1.1)}

canvas{border:4px solid #00f7ff;border-radius:20px;background:#000;margin:10px auto;display:block;cursor:crosshair;touch-action:none}
.respuesta{max-height:400px;overflow-y:auto;background:rgba(0,0,0,0.9);padding:25px;border-radius:15px;margin-top:20px;text-align:left;font-size:16px;border:2px solid #00f7ff;line-height:1.8}
select{padding:12px;border-radius:15px;background:rgba(10,10,26,0.9);color:#fff;border:3px solid #00f7ff;width:100%;font-size:15px}
#stats{position:fixed;top:35px;right:30px;background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:15px;border:2px solid #00f7ff;font-family:'Orbitron'}
