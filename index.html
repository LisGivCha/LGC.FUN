<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Highway</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:monospace;
}

canvas{
  display:block;
  image-rendering: pixelated;
}

.menuBtn{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:55px;
  border-radius:12px;
  border:2px solid white;
  background:rgba(255,255,255,0.12);
  color:white;
  font-size:18px;
  display:none;
  align-items:center;
  justify-content:center;
}

#playBtn{ top:45%; }
#skinBtnMenu{ top:55%; }

.btn{
  position:absolute;
  bottom:25px;
  width:85px;
  height:85px;
  border-radius:18px;
  background:rgba(255,255,255,0.12);
  border:2px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:white;
}
#left{ left:25px; }
#right{ left:120px; }
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="playBtn" class="menuBtn">▶ JUGAR</div>
<div id="skinBtnMenu" class="menuBtn">🎨 SKINS</div>

<div id="left" class="btn">⬅</div>
<div id="right" class="btn">➡</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");
ctx.imageSmoothingEnabled=false;

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* =====================
   ESTADO
===================== */
let state="menu";
let score=0;
let speed=2;

/* =====================
   JUGADOR
===================== */
let player={lane:1,skin:0};

/* =====================
   ENTIDADES
===================== */
let enemies=[];
let particles=[];
let laneCooldown=[0,0,0]; // 🔥 FIX CRUCES

/* =====================
   SKINS
===================== */
const skins=[
  {body:"#fff",shadow:"#bbb",window:"#222"},
  {body:"#111",shadow:"#000",window:"#333"},
  {body:"#ff3b3b",shadow:"#8b0000",window:"#2a0000"},
  {body:"#ffd84a",shadow:"#a87a00",window:"#2b2200"},
  {body:"#3cff6a",shadow:"#1e8f3a",window:"#0b2a14"}
];

/* =====================
   CARRILES AAA (SIN CRUCES)
===================== */
function lanes(){
  const left=c.width*0.2;
  const right=c.width*0.8;
  const step=(right-left)/2;
  return [left,left+step,right];
}

/* =====================
   UI
===================== */
const playBtn=document.getElementById("playBtn");
const skinBtnMenu=document.getElementById("skinBtnMenu");

playBtn.addEventListener("touchstart",start);

skinBtnMenu.addEventListener("touchstart",()=>{
  player.skin=(player.skin+1)%skins.length;
});

/* CONTROLES */
document.getElementById("left").addEventListener("touchstart",()=>{
  if(state!=="play") return;
  player.lane=Math.max(0,player.lane-1);
});

document.getElementById("right").addEventListener("touchstart",()=>{
  if(state!=="play") return;
  player.lane=Math.min(2,player.lane+1);
});

/* =====================
   SPAWN AAA (SIN ENCierros)
===================== */
function spawn(){
  let lane=Math.floor(Math.random()*3);

  if(laneCooldown[lane]>0) return;

  enemies.push({
    lane,
    y:-200,
    type:Math.random()<0.2?"truck":Math.random()<0.35?"bus":"car",
    passed:false
  });

  laneCooldown[lane]=110; // bloqueo anti-cruce
}

/* =====================
   SCORE FIX
===================== */
function handleScore(e){
  if(e.passed) return;

  if(e.y>c.height){
    e.passed=true;
    score+=e.type==="truck"?10:e.type==="bus"?15:5;
  }
}

/* =====================
   HITBOX AAA
===================== */
function hit(e){
  return (
    e.lane===player.lane &&
    e.y>c.height-190 &&
    e.y<c.height-110
  );
}

/* =====================
   EXPLOSION
===================== */
function explosion(x,y){
  for(let i=0;i<25;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8,
      life:25
    });
  }
}

/* =====================
   FONDO CIUDAD
===================== */
function city(){
  ctx.fillStyle="#080808";
  ctx.fillRect(0,0,c.width,c.height);

  for(let i=0;i<70;i++){
    let x=i*16;
    let h=80+(Math.sin(i)*50);

    ctx.fillStyle="#111";
    ctx.fillRect(x,c.height/2-h,12,h);
  }
}

/* =====================
   CARRETERA
===================== */
function road(){
  ctx.fillStyle="#6b6b6b";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.strokeStyle="#ffd400";
  ctx.lineWidth=5;

  ctx.beginPath();
  ctx.moveTo(c.width/2,0);
  ctx.lineTo(c.width/2,c.height);
  ctx.stroke();
}

/* =====================
   CARRO AAA
===================== */
function drawCar(x,y,s){
  ctx.fillStyle=s.body;
  ctx.fillRect(x-25,y,50,90);

  ctx.fillStyle=s.shadow;
  ctx.fillRect(x+10,y+5,10,80);

  ctx.fillStyle=s.window;
  ctx.fillRect(x-12,y+12,24,35);

  ctx.fillStyle="#000";
  ctx.fillRect(x-28,y+20,8,24);
  ctx.fillRect(x+20,y+20,8,24);
  ctx.fillRect(x-28,y+60,8,24);
  ctx.fillRect(x+20,y+60,8,24);
}

/* =====================
   TRUCK
===================== */
function drawTruck(x,y){
  ctx.fillStyle="#b30000";
  ctx.fillRect(x-27,y,54,70);

  ctx.fillStyle="#444";
  ctx.fillRect(x-34,y+70,68,90);
}

/* =====================
   BUS
===================== */
function drawBus(x,y){
  ctx.fillStyle="#2b6cff";
  ctx.fillRect(x-27,y,54,120);

  ctx.fillStyle="#111";
  for(let i=0;i<5;i++){
    ctx.fillRect(x-20,y+10+i*18,40,10);
  }
}

/* =====================
   PLAYER
===================== */
function drawPlayer(){
  let l=lanes();
  drawCar(l[player.lane],c.height-180,skins[player.skin]);
}

/* =====================
   ENEMIGOS AAA LOOP
===================== */
function drawEnemies(){
  let l=lanes();

  enemies.forEach(e=>{
    e.y+=speed;
    let x=l[e.lane];

    if(e.type==="truck") drawTruck(x,e.y);
    else if(e.type==="bus") drawBus(x,e.y);
    else drawCar(x,e.y,skins[2]);

    handleScore(e);

    if(hit(e)){
      explosion(x,e.y);
      state="gameover";
    }
  });

  enemies=enemies.filter(e=>e.y<c.height+300);
}

/* =====================
   PARTÍCULAS
===================== */
function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.fillStyle="#ff4444";
    ctx.fillRect(p.x,p.y,3,3);
  });

  particles=particles.filter(p=>p.life>0);
}

/* =====================
   COOLDOWN LANES FIX
===================== */
function updateCooldown(){
  for(let i=0;i<3;i++){
    if(laneCooldown[i]>0) laneCooldown[i]--;
  }
}

/* =====================
   UI UPDATE
===================== */
function updateUI(){
  playBtn.style.display=state==="menu"?"flex":"none";
  skinBtnMenu.style.display=state==="menu"?"flex":"none";
}

/* =====================
   MENÚ
===================== */
function drawMenu(){
  city();

  ctx.fillStyle="white";
  ctx.textAlign="center";

  ctx.font="32px monospace";
  ctx.fillText("PIXEL HIGHWAY",c.width/2,c.height/2-60);

  ctx.font="16px monospace";
  ctx.fillText("AAA MOTOR FINAL ESTABLE",c.width/2,c.height/2-20);
}

/* =====================
   GAME OVER
===================== */
function drawGameOver(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="white";
  ctx.textAlign="center";

  ctx.font="30px monospace";
  ctx.fillText("GAME OVER",c.width/2,c.height/2-40);

  ctx.font="16px monospace";
  ctx.fillText("Score: "+score,c.width/2,c.height/2);

  ctx.fillText("Toca JUGAR",c.width/2,c.height/2+40);
}

/* =====================
   START
===================== */
function start(){
  state="play";
  enemies=[];
  particles=[];
  score=0;
  player.lane=1;
  laneCooldown=[0,0,0];
}

/* =====================
   LOOP
===================== */
function loop(){

  updateUI();
  updateCooldown();

  if(state==="menu") drawMenu();

  if(state==="play"){
    city();
    road();
    drawPlayer();
    drawEnemies();
    drawParticles();

    ctx.fillStyle="white";
    ctx.fillText("Score: "+score,20,40);
  }

  if(state==="gameover") drawGameOver();

  requestAnimationFrame(loop);
}

/* SPAWN */
setInterval(()=>{
  if(state==="play") spawn();
},800);

loop();
</script>

</body>
  </html>
