<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatetí</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 40px;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  width: 300px;
  margin: auto;
}

.cell {
  width: 100px;
  height: 100px;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid black;
  cursor: pointer;
}

#winScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  color: white;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#winText {
  font-size: 40px;
  margin-bottom: 20px;
}

#backBtn {
  font-size: 30px;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Tatetí (3 en raya)</h1>

<div id="board"></div>

<div id="winScreen">
  <div id="winText"></div>
  <button id="backBtn">⬅ Salir / Reiniciar</button>
</div>

<script>
let board = Array(9).fill(null);
let turn = "X";
let gameOver = false;

const boardDiv = document.getElementById("board");
const winScreen = document.getElementById("winScreen");
const winText = document.getElementById("winText");
const backBtn = document.getElementById("backBtn");

function drawBoard() {
  boardDiv.innerHTML = "";

  board.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = cell;

    div.onclick = () => play(i);

    boardDiv.appendChild(div);
  });
}

function play(i) {
  if (board[i] || gameOver) return;

  board[i] = turn;

  if (checkWin(turn)) {
    showWin(turn);
    gameOver = true;
  } else {
    turn = turn === "X" ? "O" : "X";
  }

  drawBoard();
}

function checkWin(p) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,6,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return wins.some(combo =>
    combo.every(i => board[i] === p)
  );
}

function showWin(player) {
  winText.textContent = "Victoria de " + player;
  winScreen.style.display = "flex";
}

backBtn.onclick = () => {
  board = Array(9).fill(null);
  turn = "X";
  gameOver = false;
  winScreen.style.display = "none";
  drawBoard();
};

drawBoard();
</script>

</body>
</html>
