<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaTeTi Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
touch-action:manipulation;
}

/* PANTALLAS */
.screen{
display:none;
height:100vh;
width:100vw;
padding:20px;
text-align:center;
}
.active{display:block}

/* LOGIN + MENU */
#login,#menu{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#1f3b2c;
background-image:
linear-gradient(rgba(255,255,255,0.05)1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.05)1px,transparent 1px);
background-size:50px 50px;
}

/* INPUT */
input{
width:80%;
max-width:300px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

/* BOTONES */
button{
width:80%;
max-width:300px;
padding:14px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
font-size:16px;
font-weight:bold;
}

/* INFO */
#info{
opacity:0.8;
font-size:14px;
}

/* TABLERO */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
width:90vw;
max-width:320px;
aspect-ratio:1;
gap:8px;
margin:auto;
margin-top:20px;
}

.cell{
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
border-radius:10px;
}

/* CONFETI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h1>🎮 TaTeTi Pro</h1>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="auth()">Entrar / Registrarse</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<h1>MENÚ</h1>

<div id="info"></div>

<button onclick="start('easy')">IA Promedio</button>
<button onclick="start('pro')">IA Profesional</button>
<button onclick="logout()">Cerrar sesión</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div id="levelInfo"></div>
<div class="grid" id="grid"></div>
</div>

<!-- WIN -->
<div id="win" class="screen">
<h1 id="winText"></h1>
<button onclick="restart()">Seguir</button>
<button onclick="toMenu()">Salir</button>
</div>

<script>

/* USERS */
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser=null;

/* 🔐 LOGIN / REGISTER CORRECTO */
function auth(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u || !p) return;

/* SI NO EXISTE → CREAR */
if(!users[u]){
users[u]={
pass:p,
points:0,
xp:0,
level:1
};
}

/* SI EXISTE → VALIDAR */
if(users[u].pass !== p){
alert("Contraseña incorrecta");
return;
}

/* LOGIN OK */
currentUser=u;
save();
show("menu");
updateInfo();
}

/* SAVE */
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

/* MENU INFO */
function updateInfo(){
let u=users[currentUser];

document.getElementById("info").innerHTML=
"👤 "+currentUser+
" | 🏆 "+u.points+
" pts | ⭐ lvl "+u.level;
}

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGOUT */
function logout(){
currentUser=null;
show("login");
}

/* GAME */
let board=["","","","","","","","",""];
let turn="X";
let mode="easy";
let active=true;

/* START */
function start(m){
mode=m;
reset();
show("game");
}

/* RESET */
function reset(){
board=["","","","","","","","",""];
turn="X";
active=true;
draw();
}

/* DRAW */
function draw(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.innerText=board[i];
d.onclick=()=>play(i);
g.appendChild(d);
}
}

/* PLAY */
function play(i){
if(!active||board[i]!="")return;

board[i]=turn;
check();

turn=turn=="X"?"O":"X";
draw();

/* IA */
if(mode!=="friend" && turn==="O" && active){
setTimeout(aiMove,300);
}
}

/* IA EASY */
function aiEasy(){
let e=[];
board.forEach((v,i)=>{if(!v)e.push(i);});
return e[Math.floor(Math.random()*e.length)];
}

/* IA PRO (MINIMAX) */
function aiPro(){
let best=-999,move;

for(let i=0;i<9;i++){
if(board[i]==""){
board[i]="O";
let s=minimax(false);
board[i]="";
if(s>best){best=s;move=i;}
}
}
return move;
}

function minimax(max){
let w=winner();
if(w==="O")return 10;
if(w==="X")return -10;
if(!board.includes(""))return 0;

if(max){
let best=-999;
for(let i=0;i<9;i++){
if(board[i]==""){
board[i]="O";
best=Math.max(best,minimax(false));
board[i]="";
}
}
return best;
}else{
let best=999;
for(let i=0;i<9;i++){
if(board[i]==""){
board[i]="X";
best=Math.min(best,minimax(true));
board[i]="";
}
}
return best;
}
}

/* IA MOVE */
function aiMove(){
let move = mode==="easy" ? aiEasy() : aiPro();
board[move]="O";
check();
turn="X";
draw();
}

/* WIN */
function winner(){
let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
for(let x of w){
let[a,b,c]=x;
if(board[a]&&board[a]==board[b]&&board[a]==board[c])
return board[a];
}
return null;
}

/* XP + LEVEL + POINTS */
function addStats(w){
let u=users[currentUser];

if(w==="X") u.xp+=10;
if(w==="O") u.xp+=20;

u.level = Math.floor(u.xp/50)+1;
u.points += (w==="X") ? 10 : 20;

save();
}

/* CHECK */
function check(){
let w=winner();

if(w){
active=false;

if(currentUser) addStats(w);

confetti();
show("win");
winText.innerText="Ganó "+w;
updateInfo();
return;
}

if(!board.includes("")){
active=false;
show("win");
winText.innerText="Empate";
}
}

/* CONFETTI */
function confetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* WIN SCREEN */
function restart(){
reset();
show("game");
}

function toMenu(){
updateInfo();
show("menu");
}

</script>

</body>
  </html>
