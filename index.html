<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TaTeTi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* PANTALLAS */
.screen{
display:none;
height:100vh;
text-align:center;
padding:20px;
}
.active{display:block;}

/* MENU */
#menu{
background:#1f3b2c;
background-image:
linear-gradient(rgba(255,255,255,0.05)1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.05)1px,transparent 1px);
background-size:60px 60px;
}

/* INPUT */
input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

/* BOTONES */
button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
cursor:pointer;
}

/* TABLERO */
.grid{
display:grid;
grid-template-columns:repeat(3,100px);
grid-template-rows:repeat(3,100px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.cell{
background:#222;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* CONFETI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>

</head>

<body>

<!-- REGISTRO / LOGIN AUTOMATICO -->
<div id="login" class="screen active">
<h1>REGISTRO</h1>

<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>

<button onclick="register()">Registrarse / Entrar</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<h1>TATETI</h1>

<div id="info"></div>

<button onclick="start()">Jugar</button>
<button onclick="logout()">Cerrar sesión</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h2 id="turn"></h2>
<div class="grid" id="grid"></div>
</div>

<!-- WIN -->
<div id="win" class="screen">
<h1 id="winText"></h1>
<button onclick="restart()">Seguir jugando</button>
<button onclick="toMenu()">Salir</button>
</div>

<script>

/* ===== USERS ===== */
let users = JSON.parse(localStorage.getItem("users") || "{}");
let currentUser = null;

/* REGISTRO + LOGIN AUTOMÁTICO */
function register(){
let u=user.value;
let p=pass.value;

if(!u||!p)return;

/* si no existe → crear */
if(!users[u]){
users[u]={
pass:p,
points:0
};
}

/* si existe → validar */
if(users[u].pass !== p){
alert("Contraseña incorrecta");
return;
}

currentUser=u;
save();
show("menu");
updateInfo();
}

/* GUARDAR */
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

/* INFO MENU */
function updateInfo(){
document.getElementById("info").innerHTML=
"👤 "+currentUser+" | 🏆 "+users[currentUser].points+" pts";
}

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGOUT */
function logout(){
currentUser=null;
show("login");
}

/* GAME */
let board=["","","","","","","","",""];
let turn="X";
let active=true;

/* START */
function start(){
reset();
show("game");
}

/* RESET */
function reset(){
board=["","","","","","","","",""];
turn="X";
active=true;
draw();
}

/* DRAW */
function draw(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.innerText=board[i];
d.onclick=()=>play(i);
g.appendChild(d);
}
}

/* PLAY */
function play(i){
if(!active||board[i]!="")return;

board[i]=turn;
check();

turn=turn=="X"?"O":"X";
draw();
}

/* WIN */
function winner(){
let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
for(let x of w){
let[a,b,c]=x;
if(board[a]&&board[a]==board[b]&&board[a]==board[c])
return board[a];
}
return null;
}

/* CHECK */
function check(){
let w=winner();

if(w){
active=false;

/* puntos */
if(currentUser){
users[currentUser].points += (w==="X") ? 10 : 20;
save();
updateInfo();
}

confetti();
show("win");
winText.innerText="Ganó "+w;
return;
}

if(!board.includes("")){
active=false;
show("win");
winText.innerText="Empate";
}
}

/* CONFETI */
function confetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* WIN */
function restart(){
reset();
show("game");
}

function toMenu(){
updateInfo();
show("menu");
}

</script>

</body>
</html>
