<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TaTeTi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

/* PANTALLAS */
.screen {
    display: none;
    padding: 20px;
    animation: fade 0.4s ease;
}
.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0; transform: scale(0.98);}
    to {opacity: 1; transform: scale(1);}
}

/* MENU PIZARRA */
#menu {
    background: #1f3b2c;
    height: 100vh;
    background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
}

h1 {
    margin-top: 60px;
    font-size: 28px;
    text-transform: uppercase;
}

/* BOTONES */
button {
    padding: 15px 20px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #2ecc71;
    color: white;
    transition: 0.2s;
}
button:hover {
    background: #27ae60;
    transform: scale(1.05);
}

/* TABLERO */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    background: #222;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
}

.back {
    font-size: 22px;
    cursor: pointer;
}

.score {
    font-size: 18px;
}

/* VICTORIA */
#win {
    animation: pop 0.4s ease;
}

@keyframes pop {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <h1>TATETI, GATO O TRES EN RAYA</h1>
    <button onclick="startGame('ai')">Jugar contra robot</button>
    <button onclick="startGame('friend')">Jugar con un amigo</button>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
    <div class="topbar">
        <span class="back" onclick="goMenu()">⬅</span>
        <div class="score" id="score">X: 0 vs 0 :O</div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<!-- VICTORIA -->
<div id="win" class="screen">
    <h1 id="winText"></h1>
    <button onclick="continueGame()">Seguir jugando</button>
    <button onclick="goMenu()">Salir al inicio</button>
</div>

<audio id="winSound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

let board = ["","","","","","","","",""];
let turn = "X";
let mode = "friend";
let scoreX = 0;
let scoreO = 0;
let gameActive = true;

const grid = document.getElementById("grid");
const winSound = document.getElementById("winSound");

function showScreen(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function startGame(m){
    mode = m;
    resetBoard();
    showScreen("game");
}

function goMenu(){
    showScreen("menu");
}

function continueGame(){
    resetBoard();
    showScreen("game");
}

function resetBoard(){
    board = ["","","","","","","","",""];
    turn = "X";
    gameActive = true;
    draw();
}

function draw(){
    grid.innerHTML = "";
    board.forEach((val,i)=>{
        const div = document.createElement("div");
        div.className = "cell";
        div.innerText = val;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });
    updateScore();
}

function play(i){
    if(!gameActive || board[i] !== "") return;

    board[i] = turn;
    checkWin();

    if(mode === "ai" && gameActive){
        turn = "O";
        draw();
        setTimeout(aiMove, 200);
    } else {
        turn = turn === "X" ? "O" : "X";
    }

    draw();
}

/* 🧠 IA INTELIGENTE */
function aiMove(){
    let bestScore = -Infinity;
    let move;

    for(let i = 0; i < board.length; i++){
        if(board[i] === ""){
            board[i] = "O";
            let score = minimax(board, 0, false);
            board[i] = "";

            if(score > bestScore){
                bestScore = score;
                move = i;
            }
        }
    }

    board[move] = "O";
    checkWin();
    turn = "X";
    draw();
}

function minimax(newBoard, depth, isMax){
    let winner = getWinner();

    if(winner === "O") return 10 - depth;
    if(winner === "X") return depth - 10;
    if(!newBoard.includes("")) return 0;

    if(isMax){
        let best = -Infinity;
        for(let i=0;i<9;i++){
            if(newBoard[i]===""){
                newBoard[i]="O";
                best = Math.max(best, minimax(newBoard, depth+1, false));
                newBoard[i]="";
            }
        }
        return best;
    } else {
        let best = Infinity;
        for(let i=0;i<9;i++){
            if(newBoard[i]===""){
                newBoard[i]="X";
                best = Math.min(best, minimax(newBoard, depth+1, true));
                newBoard[i]="";
            }
        }
        return best;
    }
}

function getWinner(){
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for(let w of wins){
        let [a,b,c] = w;
        if(board[a] && board[a] === board[b] && board[a] === board[c]){
            return board[a];
        }
    }
    return null;
}

function checkWin(){
    let w = getWinner();

    if(w){
        gameActive = false;

        if(w==="X") scoreX++;
        if(w==="O") scoreO++;

        document.getElementById("winText").innerText =
            "¡Victoria de " + w + "!";

        winSound.play();
        showScreen("win");
        return;
    }

    if(!board.includes("")){
        gameActive = false;
        document.getElementById("winText").innerText = "¡Empate!";
        showScreen("win");
    }
}

function updateScore(){
    document.getElementById("score").innerText =
        "X: " + scoreX + " vs " + scoreO + " :O";
}

</script>

</body>
</html>
